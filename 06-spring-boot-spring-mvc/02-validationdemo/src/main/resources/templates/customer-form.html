<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Registration Form</title>

    <style>
        .error {color: red}
    </style>
</head>
<body>

<i>Please Fill out the Form. Asterisk (*) means required</i>
<br><br>

<form th:action="@{/processForm}" th:object="${customer}" method="post">
    First Name: <input type="text" th:field="*{firstName}"/>
    <br><br>
    Last Name (*): <input type="text" th:field="*{lastName}"/>

    <!-- Add error message (if present)-->
    <span th:if="${#fields.hasErrors('lastName')}"
          th:errors="*{lastName}"
          class="error"></span>
    <br><br>
    Modules: <input type="text" th:field="*{modules}"/>
    <!-- Add error message (if present)-->
    <span th:if="${#fields.hasErrors('modules')}"
          th:errors="*{modules}"
          class="error"></span>

    <br><br>
    Postal Code: <input type="text" th:field="*{postalCode}"/>
    <!-- Add error message (if present)-->
    <span th:if="${#fields.hasErrors('postalCode')}"
          th:errors="*{postalCode}"
          class="error"></span>

    <br><br>
    Course Code: <input type="text" th:field="*{courseCode}"/>
    <!-- Add error message (if present)-->
    <span th:if="${#fields.hasErrors('courseCode')}"
          th:errors="*{courseCode}"
          class="error"></span>

    <br><br>
    <input type="submit" value="Submit"/>
</form>

</body>
</html>
